spring:
  main:
    web-application-type: reactive
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      routes:
        - id: ms-clientes
          uri: http://localhost:8081
          predicates:
            - Path=/api/clientes/**
        - id: ms-inventario
          uri: http://localhost:8082
          predicates:
            - Path=/api/productos/**
        - id: ms-ventas
          uri: http://localhost:8083
          predicates:
            - Path=/api/pedidos/**
        - id: ms-logistica
          uri: http://localhost:8084
          predicates:
            - Path=/api/despachos/**
    discovery:
      locator:
        enabled: false
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
